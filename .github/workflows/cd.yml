name: Continuous Deployment
run-name: CD for commit ${{ github.sha }} by @${{ github.actor }}

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  docker:
    name: Docker E2E Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t anime-review-api:${{ github.sha }} .

      - name: Start compose stack
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET_CI || 'dummy' }}
          POSTGRES_DB: anime_review
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          DB_PORT: 5433
          APP_PORT: 3000
        run: docker compose up -d --build

      - name: Wait for app health
        run: |
          for i in {1..30}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' anime-review-api 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "App container is healthy"
              exit 0
            fi
            if [ "$STATUS" = "unhealthy" ]; then
              echo "App container is unhealthy"
              docker compose logs --no-color app db
              exit 1
            fi
            sleep 2
          done
          echo "Timed out waiting for healthy app container"
          docker compose logs --no-color app db
          exit 1

      - name: Smoke test API
        run: |
          HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" http://localhost:3000/api/animes)
          cat /tmp/resp.txt
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Expected HTTP 200, got $HTTP_CODE"
            docker compose logs --no-color app db
            exit 1
          fi

      - name: Print compose status
        if: always()
        run: docker compose ps

      - name: Print compose logs
        if: failure()
        run: docker compose logs --no-color app db

      - name: Tear down stack
        if: always()
        run: docker compose down -v
