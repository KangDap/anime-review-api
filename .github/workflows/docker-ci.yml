name: Docker CI
run-name: Docker CI for commit ${{ github.sha }} by @${{ github.actor }}

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  workflow_dispatch:

jobs:
  docker:
    name: Docker E2E Test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t anime-review-api:${{ github.sha }} .

      - name: Create temporary .env for CI
        run: |
          cat > .env << 'EOF'
          JWT_SECRET=dummy
          JWT_EXPIRES_IN=24h
          EOF

      - name: Start compose stack
        env:
          JWT_SECRET: dummy
          POSTGRES_DB: anime_review
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          DB_PORT: 5433
          APP_PORT: 3000
        run: docker compose up -d --build

      - name: Wait for app readiness
        run: |
          for i in {1..90}; do
            RUNNING=$(docker inspect --format='{{.State.Running}}' anime-review-api 2>/dev/null || echo "false")
            EXIT_CODE=$(docker inspect --format='{{.State.ExitCode}}' anime-review-api 2>/dev/null || echo "unknown")

            if [ "$RUNNING" != "true" ]; then
              echo "App container is not running (exit code: $EXIT_CODE)"
              docker compose logs --no-color app db
              exit 1
            fi

            HTTP_CODE=$(curl -s -o /tmp/wait.txt -w "%{http_code}" http://localhost:3000/api/animes || echo "000")
            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "App endpoint is ready"
              exit 0
            fi

            echo "Waiting for app readiness... current status code: $HTTP_CODE"
            sleep 2
          done

          echo "Timed out waiting for app readiness"
          docker compose logs --no-color app db
          exit 1

      - name: Smoke test API
        run: |
          HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" http://localhost:3000/api/animes)
          cat /tmp/resp.txt
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Expected HTTP 200, got $HTTP_CODE"
            docker compose logs --no-color app db
            exit 1
          fi

      - name: Print compose status
        if: always()
        run: docker compose ps

      - name: Print compose logs
        if: failure()
        run: docker compose logs --no-color app db

      - name: Tear down stack
        if: always()
        run: docker compose down -v
